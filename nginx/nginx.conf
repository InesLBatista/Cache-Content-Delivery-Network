events {}

http {
    # Round-robin upstream across all CDN nodes 
    # Nginx distributes incoming client requests evenly across the three nodes.
    # Each node has its own independent cache volume, so a request routed to
    # cdn-node-2 will not find a file cached by cdn-node-1 — this is intentional
    # and demonstrates horizontal scalability with independent cache partitions.
    upstream cdn_nodes {
        server cdn-node-1:8081;
        server cdn-node-2:8081;
        server cdn-node-3:8081;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://cdn_nodes;

            # Forward the real client IP so CDN nodes can log it
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host            $host;

            # Surface which CDN node actually handled the request
            add_header X-CDN-Node $upstream_addr always;
        }
    }
}
