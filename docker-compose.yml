services:

  # ─── MQTT Broker ────────────────────────────────────────────────────────────
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    restart: unless-stopped

  # ─── Origin Server ──────────────────────────────────────────────────────────
  origin:
    build:
      context: ./origin_server
      dockerfile: Dockerfile
    container_name: origin
    ports:
      - "8001:8000"   # host:8001 → container:8000 (8000 already in use on host)
    volumes:
      - ./origin_server/storage:/app/storage
    environment:
      - MQTT_BROKER=mqtt-broker
      - CACHE_TTL_SECONDS=0   # set > 0 to enable TTL (e.g. 60 for 60s expiry)
    depends_on:
      - mqtt-broker
    restart: unless-stopped

  # ─── CDN Node 1 ─────────────────────────────────────────────────────────────
  cdn-node-1:
    build:
      context: ./cdn_node
      dockerfile: Dockerfile
    container_name: cdn-node-1
    ports:
      - "8081:8081"   # also directly accessible for debugging
    volumes:
      - cdn_cache_1:/app/cache
    environment:
      - ORIGIN_URL=http://origin:8000
      - MQTT_BROKER=mqtt-broker
      - CDN_PORT=8081
      - NODE_ID=cdn-node-1
      - CACHE_MAX_BYTES=104857600   # 100 MB per node
    depends_on:
      - origin
      - mqtt-broker
    restart: unless-stopped

  # ─── CDN Node 2 ─────────────────────────────────────────────────────────────
  cdn-node-2:
    build:
      context: ./cdn_node
      dockerfile: Dockerfile
    container_name: cdn-node-2
    ports:
      - "8082:8081"   # directly accessible on host port 8082
    volumes:
      - cdn_cache_2:/app/cache
    environment:
      - ORIGIN_URL=http://origin:8000
      - MQTT_BROKER=mqtt-broker
      - CDN_PORT=8081
      - NODE_ID=cdn-node-2
      - CACHE_MAX_BYTES=104857600   # 100 MB per node
    depends_on:
      - origin
      - mqtt-broker
    restart: unless-stopped

  # ─── CDN Node 3 ─────────────────────────────────────────────────────────────
  cdn-node-3:
    build:
      context: ./cdn_node
      dockerfile: Dockerfile
    container_name: cdn-node-3
    ports:
      - "8083:8081"   # directly accessible on host port 8083
    volumes:
      - cdn_cache_3:/app/cache
    environment:
      - ORIGIN_URL=http://origin:8000
      - MQTT_BROKER=mqtt-broker
      - CDN_PORT=8081
      - NODE_ID=cdn-node-3
      - CACHE_MAX_BYTES=104857600   # 100 MB per node
    depends_on:
      - origin
      - mqtt-broker
    restart: unless-stopped

  # ─── Load Balancer (Nginx – round-robin) ────────────────────────────────────
  load-balancer:
    image: nginx:1.27-alpine
    container_name: load-balancer
    ports:
      - "8090:8080"   # single entry point for clients (host:8090 → nginx:8080)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cdn-node-1
      - cdn-node-2
      - cdn-node-3
    restart: unless-stopped

# ─── Persistent volumes (one per CDN node + broker) ─────────────────────────
volumes:
  cdn_cache_1:
    driver: local
  cdn_cache_2:
    driver: local
  cdn_cache_3:
    driver: local
  mqtt_data:
    driver: local
  mqtt_logs:
    driver: local
